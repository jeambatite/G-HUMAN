<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<div class="login-root">
  <div class="waves">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <div class="form-card">
    <div class="form-logo">
      <h1>G-<span>HUMAN</span></h1>
      <p>Plataforma de Gestión Empresarial</p>
      <div class="divider-line"></div>
    </div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" placeholder="Ingresa tu usuario" [(ngModel)]="username">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••" [(ngModel)]="password">
    </div>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <button class="btn-login" (click)="iniciarSesion()" [disabled]="cargando">
      {{ cargando ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <p class="footer-text">¿Sin acceso? <a href="#">Contacta a TI</a></p>
  </div>
</div>
